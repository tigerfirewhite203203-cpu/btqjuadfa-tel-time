<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="NeonClock"/>
  <title>NeonClock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700;6..12,800;6..12,900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0a0a0f;
      --neon-pink:#ff2d95;
      --neon-cyan:#00f0ff;
      --neon-purple:#b44aff;
      --neon-green:#39ff14;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{
      height:100%;width:100%;overflow:hidden;
      touch-action:none;
      -webkit-touch-callout:none;
      -webkit-user-select:none;user-select:none;
      -webkit-text-size-adjust:100%;
    }
    body{background:var(--bg);font-family:'Rajdhani',sans-serif;position:relative;}

    /* ══════ APP WRAPPER — handles rotation ══════ */
    .app{
      position:fixed;inset:0;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    /* Portrait on phone: rotate content */
    .app.force-landscape{
      width:100vh;height:100vw;
      position:fixed;top:0;left:0;
      transform:rotate(90deg) translateY(-100vw);
      transform-origin:top left;
    }

    /* BG grid */
    .grid-bg{
      position:absolute;inset:0;pointer-events:none;
      background:
        linear-gradient(rgba(0,240,255,.018) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,240,255,.018) 1px,transparent 1px);
      background-size:40px 40px;
    }

    /* Orbs */
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none;animation:orbF 14s ease-in-out infinite alternate;}
    .orb-1{width:250px;height:250px;background:var(--neon-pink);top:-60px;left:-80px;}
    .orb-2{width:200px;height:200px;background:var(--neon-cyan);bottom:-40px;right:-60px;animation-delay:-5s;}
    @keyframes orbF{0%{transform:translate(0,0) scale(1);}100%{transform:translate(15px,-20px) scale(1.08);}}

    /* ══════ CLOCK VIEWS ══════ */
    .clock-view{display:none;width:100%;height:100%;align-items:center;justify-content:center;flex-direction:column;position:relative;z-index:1;}
    .clock-view.active{display:flex;}

    /* ── CYBER ── */
    #mode-cyber{gap:.5rem;}
    .cyber-time{
      font-family:'Orbitron',monospace;font-weight:900;
      font-size:min(18vw, 10rem);
      color:#fff;line-height:1;letter-spacing:.05em;
      text-shadow:0 0 10px var(--neon-cyan),0 0 30px var(--neon-cyan),0 0 60px rgba(0,240,255,.25);
    }
    .cb{animation:cBlink 1s step-end infinite;}
    @keyframes cBlink{0%,100%{opacity:1;}50%{opacity:.12;}}
    .cyber-date{
      font-weight:300;font-size:min(2.5vw,1rem);
      letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.25);
    }
    .cyber-date .cd-day{color:var(--neon-cyan);font-weight:600;text-shadow:0 0 12px rgba(0,240,255,.4);}
    .cyber-secs{
      font-family:'Orbitron',monospace;font-weight:400;
      font-size:min(4vw,1.8rem);
      color:rgba(0,240,255,.3);letter-spacing:.1em;margin-top:.1rem;
    }

    /* ── MINIMAL ── */
    #mode-minimal{gap:.4rem;}
    .mini-time{
      font-family:'Nunito Sans',sans-serif;font-weight:800;
      font-size:min(20vw,11rem);
      color:#4a4a5a;
      line-height:1;letter-spacing:-.02em;
    }
    .mini-date{
      font-family:'Nunito Sans',sans-serif;font-weight:600;
      font-size:min(2.2vw,.9rem);
      color:#38384a;letter-spacing:.25em;text-transform:uppercase;
    }

    /* ── CUSTOM ── */
    #mode-custom{gap:.4rem;}
    .cust-time{
      font-family:'Orbitron',monospace;font-weight:900;
      font-size:min(18vw,10rem);
      line-height:1;letter-spacing:.05em;transition:color .4s,text-shadow .4s;
    }
    .cust-time .cb{animation:cBlink 1s step-end infinite;}
    .cust-date{font-weight:300;font-size:min(2.5vw,1rem);letter-spacing:.35em;text-transform:uppercase;transition:color .4s;}
    .cust-secs{
      font-family:'Orbitron',monospace;font-weight:400;
      font-size:min(4vw,1.8rem);
      letter-spacing:.1em;margin-top:.1rem;transition:color .4s;
    }

    /* ══════ BOTTOM BAR ══════ */
    .bottom-bar{
      position:absolute;bottom:0;left:0;right:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:.65rem 1.2rem;z-index:2;
    }
    .bb-left,.bb-right{display:flex;align-items:center;gap:.8rem;}

    /* Battery visual bar */
    .bat-wrap{display:flex;align-items:center;gap:.35rem;}
    .bat-bar{
      width:52px;height:20px;
      background:rgba(255,255,255,.06);
      border-radius:4px;position:relative;overflow:hidden;
      border:1px solid rgba(255,255,255,.1);
    }
    .bat-nub{
      position:absolute;right:-4px;top:50%;transform:translateY(-50%);
      width:3px;height:8px;background:rgba(255,255,255,.1);
      border-radius:0 2px 2px 0;
    }
    .bat-fill{
      height:100%;border-radius:3px;
      background:var(--neon-green);
      transition:width 1s;
      min-width:2px;
    }
    .bat-fill.low{background:#ff4455;}
    .bat-fill.mid{background:#ff9500;}
    .bat-text{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      font-family:'Rajdhani',sans-serif;font-weight:700;
      font-size:.5rem;color:#fff;
      text-shadow:0 1px 3px rgba(0,0,0,.9);
    }
    .bat-icon{font-size:.7rem;}

    .info-chip{font-size:.6rem;color:rgba(255,255,255,.3);letter-spacing:.06em;display:flex;align-items:center;gap:.3rem;}

    /* Gear */
    .gear-btn{
      width:36px;height:36px;border-radius:50%;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      display:flex;align-items:center;justify-content:center;
      font-size:1rem;cursor:pointer;transition:.2s;
      -webkit-tap-highlight-color:transparent;
    }
    .gear-btn:active{transform:scale(.88);background:rgba(255,255,255,.08);}

    /* ══════ SETTINGS PANEL ══════ */
    .settings-overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.93);backdrop-filter:blur(25px);
      z-index:50;display:none;align-items:center;justify-content:center;padding:1rem;
    }
    .settings-overlay.open{display:flex;}
    /* Match app rotation */
    .settings-overlay.force-landscape{
      width:100vh;height:100vw;
      position:fixed;top:0;left:0;
      transform:rotate(90deg) translateY(-100vw);
      transform-origin:top left;
    }

    .settings-card{
      background:rgba(12,12,20,.98);border:1px solid rgba(255,255,255,.07);
      border-radius:24px;padding:1.5rem;
      width:100%;max-width:420px;max-height:92%;overflow-y:auto;
      animation:popUp .2s ease;
      -webkit-overflow-scrolling:touch;
    }
    .settings-card::-webkit-scrollbar{display:none;}
    @keyframes popUp{from{opacity:0;transform:scale(.93);}}
    .st-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;}
    .st-title{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.2em;color:var(--neon-cyan);text-shadow:0 0 10px rgba(0,240,255,.3);}
    .st-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.05);border:none;color:rgba(255,255,255,.5);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .st-close:active{transform:scale(.88);}
    .st-section{margin-bottom:1.4rem;}
    .st-label{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:.7rem;}

    /* Mode cards */
    .mode-cards{display:flex;gap:.5rem;}
    .mode-card{
      flex:1;padding:.75rem .4rem;
      background:rgba(255,255,255,.02);border:2px solid rgba(255,255,255,.07);
      border-radius:14px;text-align:center;cursor:pointer;transition:.2s;
      -webkit-tap-highlight-color:transparent;
    }
    .mode-card:active{transform:scale(.95);}
    .mode-card.sel{border-color:var(--neon-cyan);background:rgba(0,240,255,.06);}
    .mc-icon{font-size:1.2rem;margin-bottom:.3rem;}
    .mc-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.7rem;color:#fff;}
    .mc-desc{font-size:.48rem;color:rgba(255,255,255,.3);margin-top:.12rem;}

    /* Color dots */
    .color-row{display:flex;gap:.5rem;flex-wrap:wrap;}
    .color-dot{
      width:32px;height:32px;border-radius:50%;
      border:2px solid transparent;cursor:pointer;transition:.15s;
      -webkit-tap-highlight-color:transparent;
    }
    .color-dot:active{transform:scale(.85);}
    .color-dot.sel{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.3);}

    /* Alarm row */
    .alarm-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:.8rem 1rem;background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.07);border-radius:14px;
    }
    .alarm-row-left{display:flex;align-items:center;gap:.6rem;}
    .al-icon{font-size:1.1rem;}
    .al-time{
      font-family:'Orbitron',monospace;font-weight:700;font-size:.9rem;
      color:rgba(255,255,255,.45);cursor:pointer;padding:.25rem .5rem;
      border-radius:8px;transition:.15s;
    }
    .al-time:active{background:rgba(255,255,255,.06);}
    .al-time.on{color:var(--neon-pink);text-shadow:0 0 8px rgba(255,45,149,.4);}

    /* Switch */
    .sw{width:44px;height:24px;background:rgba(255,255,255,.08);border-radius:12px;position:relative;transition:.3s;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
    .sw::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.3);transition:.3s;}
    .sw.on{background:var(--neon-pink);box-shadow:0 0 12px rgba(255,45,149,.4);}
    .sw.on::after{left:23px;background:#fff;}

    /* Alarm picker */
    .apicker{display:none;margin-top:.8rem;padding:.8rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:14px;}
    .apicker.open{display:block;}
    .ap-wheels{display:flex;align-items:center;justify-content:center;gap:.4rem;}
    .ap-col{display:flex;flex-direction:column;align-items:center;gap:.2rem;}
    .ap-btn{
      width:48px;height:34px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
      border-radius:8px;color:rgba(255,255,255,.35);font-size:1.1rem;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
    }
    .ap-btn:active{background:rgba(255,255,255,.08);transform:scale(.92);}
    .ap-val{font-family:'Orbitron',monospace;font-weight:900;font-size:2rem;color:#fff;text-shadow:0 0 12px var(--neon-cyan);width:55px;text-align:center;}
    .ap-sep{font-family:'Orbitron',monospace;font-size:2rem;color:var(--neon-pink);}
    .ap-confirm{margin-top:.6rem;width:100%;padding:.65rem;border-radius:10px;border:none;background:var(--neon-pink);color:#fff;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.1em;cursor:pointer;}
    .ap-confirm:active{filter:brightness(1.2);transform:scale(.97);}

    /* Snooze toggle */
    .snooze-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:.7rem 1rem;background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.07);border-radius:14px;margin-top:.5rem;
    }
    .snooze-left{display:flex;align-items:center;gap:.5rem;font-size:.7rem;color:rgba(255,255,255,.4);}

    /* Brightness slider */
    .bright-row{
      display:flex;align-items:center;gap:.8rem;
      padding:.6rem .2rem;
    }
    .bright-icon{font-size:.85rem;color:rgba(255,255,255,.3);}
    .bright-slider{
      flex:1;-webkit-appearance:none;appearance:none;
      height:4px;border-radius:2px;background:rgba(255,255,255,.1);outline:none;
    }
    .bright-slider::-webkit-slider-thumb{
      -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
      background:var(--neon-cyan);box-shadow:0 0 8px rgba(0,240,255,.4);cursor:pointer;
    }

    /* ══════ RING OVERLAY ══════ */
    .ring-overlay{position:fixed;inset:0;background:rgba(5,5,10,.97);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;}
    .ring-overlay.open{display:flex;}
    .ring-overlay.force-landscape{
      width:100vh;height:100vw;position:fixed;top:0;left:0;
      transform:rotate(90deg) translateY(-100vw);transform-origin:top left;
    }
    .ring-time{font-family:'Orbitron',monospace;font-weight:900;font-size:min(18vw,7rem);color:#fff;animation:rGlow 1s ease infinite alternate;}
    @keyframes rGlow{from{text-shadow:0 0 20px var(--neon-pink),0 0 60px var(--neon-pink);}to{text-shadow:0 0 30px var(--neon-cyan),0 0 80px var(--neon-cyan);}}
    .ring-label{font-size:.9rem;color:rgba(255,255,255,.4);letter-spacing:.3em;text-transform:uppercase;animation:rPulse 1.5s ease infinite;}
    @keyframes rPulse{0%,100%{opacity:1;}50%{opacity:.25;}}
    .ring-icon{font-size:3.5rem;animation:rShake .4s ease infinite alternate;}
    @keyframes rShake{from{transform:rotate(-15deg);}to{transform:rotate(15deg);}}
    .ring-btns{display:flex;gap:1.2rem;align-items:center;}
    .ring-stop{width:70px;height:70px;border-radius:50%;background:var(--neon-pink);border:none;font-size:1.6rem;color:#fff;cursor:pointer;box-shadow:0 0 25px rgba(255,45,149,.5);}
    .ring-stop:active{transform:scale(.88);}
    .ring-snooze{
      width:70px;height:70px;border-radius:50%;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
      font-size:.6rem;color:rgba(255,255,255,.6);cursor:pointer;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.15rem;
      font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.05em;
    }
    .ring-snooze:active{transform:scale(.88);background:rgba(255,255,255,.1);}
    .ring-snooze .rs-ico{font-size:1.2rem;}

    /* Dimmer overlay for brightness */
    .dimmer{position:fixed;inset:0;background:rgba(0,0,0,0);pointer-events:none;z-index:0;transition:background .3s;}

    /* Minimal mode overrides for bottom bar */
    .app[data-mode="minimal"] .bottom-bar{opacity:.35;}
    .app[data-mode="minimal"] .bat-fill{background:#555!important;}
    .app[data-mode="minimal"] .orb{display:none;}
    .app[data-mode="minimal"] .grid-bg{opacity:.3;}
  </style>
</head>
<body>

<div class="dimmer" id="dimmer"></div>

<div class="app" id="app">
  <div class="grid-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- CYBER -->
  <div class="clock-view active" id="mode-cyber">
    <div class="cyber-time"><span id="c-h">00</span><span class="cb">:</span><span id="c-m">00</span></div>
    <div class="cyber-secs" id="c-s">:00</div>
    <div class="cyber-date"><span class="cd-day" id="c-day">—</span> · <span id="c-date">—</span></div>
  </div>

  <!-- MINIMAL -->
  <div class="clock-view" id="mode-minimal">
    <div class="mini-time" id="m-time">00:00</div>
    <div class="mini-date" id="m-date">—</div>
  </div>

  <!-- CUSTOM -->
  <div class="clock-view" id="mode-custom">
    <div class="cust-time" id="x-time"><span id="x-h">00</span><span class="cb">:</span><span id="x-m">00</span></div>
    <div class="cust-secs" id="x-s">:00</div>
    <div class="cust-date" id="x-date">—</div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar" id="bottom-bar">
    <div class="bb-left">
      <div class="bat-wrap">
        <span class="bat-icon" id="bat-icon">🔋</span>
        <div class="bat-bar">
          <div class="bat-fill" id="bat-fill" style="width:100%"></div>
          <div class="bat-text" id="bat-text">—</div>
          <div class="bat-nub"></div>
        </div>
      </div>
      <div class="info-chip">🌡️ <span id="temp-val">…</span></div>
    </div>
    <div class="bb-right">
      <div class="info-chip" id="weather-desc"></div>
      <div class="gear-btn" onclick="openSettings()">⚙️</div>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-card">
    <div class="st-header">
      <div class="st-title">PARAMÈTRES</div>
      <button class="st-close" onclick="closeSettings()">✕</button>
    </div>

    <!-- Mode -->
    <div class="st-section">
      <div class="st-label">Mode d'horloge</div>
      <div class="mode-cards">
        <div class="mode-card sel" data-mode="cyber" onclick="selectMode('cyber')"><div class="mc-icon">⚡</div><div class="mc-name">Cyber</div><div class="mc-desc">Néon futuriste</div></div>
        <div class="mode-card" data-mode="minimal" onclick="selectMode('minimal')"><div class="mc-icon">🌙</div><div class="mc-name">Minimal</div><div class="mc-desc">Sombre discret</div></div>
        <div class="mode-card" data-mode="custom" onclick="selectMode('custom')"><div class="mc-icon">🎨</div><div class="mc-name">Custom</div><div class="mc-desc">Tu choisis tout</div></div>
      </div>
    </div>

    <!-- Colors (custom only) -->
    <div class="st-section" id="color-section" style="display:none;">
      <div class="st-label">Couleur</div>
      <div class="color-row">
        <div class="color-dot sel" style="background:#00f0ff;" data-color="#00f0ff" onclick="pickColor(this)"></div>
        <div class="color-dot" style="background:#ff2d95;" data-color="#ff2d95" onclick="pickColor(this)"></div>
        <div class="color-dot" style="background:#39ff14;" data-color="#39ff14" onclick="pickColor(this)"></div>
        <div class="color-dot" style="background:#b44aff;" data-color="#b44aff" onclick="pickColor(this)"></div>
        <div class="color-dot" style="background:#ff6a00;" data-color="#ff6a00" onclick="pickColor(this)"></div>
        <div class="color-dot" style="background:#ffe600;" data-color="#ffe600" onclick="pickColor(this)"></div>
        <div class="color-dot" style="background:#fff;" data-color="#ffffff" onclick="pickColor(this)"></div>
        <div class="color-dot" style="background:#ff4455;" data-color="#ff4455" onclick="pickColor(this)"></div>
      </div>
    </div>

    <!-- Brightness -->
    <div class="st-section">
      <div class="st-label">Luminosité écran</div>
      <div class="bright-row">
        <span class="bright-icon">🔅</span>
        <input type="range" class="bright-slider" id="bright-slider" min="0" max="85" value="0" oninput="setBrightness(this.value)"/>
        <span class="bright-icon">🔆</span>
      </div>
    </div>

    <!-- Alarm -->
    <div class="st-section">
      <div class="st-label">Alarme</div>
      <div class="alarm-row">
        <div class="alarm-row-left">
          <span class="al-icon">⏰</span>
          <span class="al-time" id="al-time-btn" onclick="toggleAPicker()">07:00</span>
        </div>
        <div class="sw" id="al-sw" onclick="toggleAlarm()"></div>
      </div>
      <div class="apicker" id="apicker">
        <div class="ap-wheels">
          <div class="ap-col">
            <button class="ap-btn" onclick="adjH(1)">▲</button>
            <div class="ap-val" id="ap-h">07</div>
            <button class="ap-btn" onclick="adjH(-1)">▼</button>
          </div>
          <div class="ap-sep">:</div>
          <div class="ap-col">
            <button class="ap-btn" onclick="adjM(1)">▲</button>
            <div class="ap-val" id="ap-m">00</div>
            <button class="ap-btn" onclick="adjM(-1)">▼</button>
          </div>
        </div>
        <button class="ap-confirm" onclick="confirmAlarm()">Confirmer</button>
      </div>
      <div class="snooze-row">
        <div class="snooze-left">💤 Snooze (5 min)</div>
        <div class="sw" id="snooze-sw" onclick="toggleSnooze()"></div>
      </div>
    </div>
  </div>
</div>

<!-- RING -->
<div class="ring-overlay" id="ring-overlay">
  <div class="ring-icon">🔔</div>
  <div class="ring-time" id="ring-time">07:00</div>
  <div class="ring-label">RÉVEIL</div>
  <div class="ring-btns">
    <button class="ring-snooze" id="ring-snooze-btn" onclick="snoozeAlarm()" style="display:none;"><span class="rs-ico">💤</span>5 min</button>
    <button class="ring-stop" onclick="stopAlarm()">✕</button>
  </div>
</div>

<script>
'use strict';

// ── State ──
let currentMode='cyber', customColor='#00f0ff';
let alarmH=7,alarmM=0,alarmOn=false,alarmRinging=false,alarmCtx=null;
let snoozeEnabled=true, snoozeTimeout=null;
let pickH=7,pickM=0;
let wakeLock=null;
let isPortrait=false;

const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const months=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
const weatherIcons={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌧️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️'};

// ── Orientation handling ──
function checkOrientation(){
  const p=window.innerHeight>window.innerWidth;
  isPortrait=p;
  const app=document.getElementById('app');
  const sov=document.getElementById('settings-overlay');
  const rov=document.getElementById('ring-overlay');
  if(p){
    app.classList.add('force-landscape');
    sov.classList.add('force-landscape');
    rov.classList.add('force-landscape');
  }else{
    app.classList.remove('force-landscape');
    sov.classList.remove('force-landscape');
    rov.classList.remove('force-landscape');
  }
}
checkOrientation();
window.addEventListener('resize',checkOrientation);
// Also check on orientation change event
window.addEventListener('orientationchange',()=>setTimeout(checkOrientation,150));

// ── Clock ──
function tick(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  const dayN=days[now.getDay()];
  const dateStr=now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();

  document.getElementById('c-h').textContent=h;
  document.getElementById('c-m').textContent=m;
  document.getElementById('c-s').textContent=':'+s;
  document.getElementById('c-day').textContent=dayN;
  document.getElementById('c-date').textContent=dateStr;

  document.getElementById('m-time').textContent=h+':'+m;
  document.getElementById('m-date').textContent=dayN+' · '+dateStr;

  document.getElementById('x-h').textContent=h;
  document.getElementById('x-m').textContent=m;
  document.getElementById('x-s').textContent=':'+s;
  document.getElementById('x-date').textContent=dayN+' · '+dateStr;

  if(alarmOn&&!alarmRinging&&now.getHours()===alarmH&&now.getMinutes()===alarmM&&now.getSeconds()===0) triggerAlarm();
}
tick();setInterval(tick,1000);

// ── Mode ──
function selectMode(mode){
  currentMode=mode;
  document.getElementById('app').setAttribute('data-mode',mode);
  document.querySelectorAll('.clock-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('mode-'+mode).classList.add('active');
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.toggle('sel',c.dataset.mode===mode));
  document.getElementById('color-section').style.display=mode==='custom'?'':'none';
}
selectMode('cyber');

// ── Custom color ──
function pickColor(el){
  customColor=el.dataset.color;
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
  applyCustomColor();
}
function applyCustomColor(){
  const t=document.getElementById('x-time');
  t.style.color=customColor;
  t.style.textShadow='0 0 10px '+customColor+',0 0 30px '+customColor+',0 0 60px '+customColor+'40';
  document.getElementById('x-date').style.color=customColor+'60';
  document.getElementById('x-s').style.color=customColor+'50';
}
applyCustomColor();

// ── Brightness (dimmer overlay) ──
function setBrightness(v){
  document.getElementById('dimmer').style.background='rgba(0,0,0,'+(v/100)+')';
}

// ── Battery — works on Android Chrome, fallback for iOS ──
let batLevel=null;
async function initBattery(){
  if('getBattery' in navigator){
    try{
      const bat=await navigator.getBattery();
      const upd=()=>{
        batLevel=Math.round(bat.level*100);
        renderBattery(batLevel,bat.charging);
      };
      upd();
      bat.addEventListener('levelchange',upd);
      bat.addEventListener('chargingchange',upd);
      return;
    }catch(e){}
  }
  // iOS: no battery API → show plugged icon, no percentage
  renderBatteryUnavailable();
}
function renderBattery(pct,charging){
  const fill=document.getElementById('bat-fill');
  fill.style.width=pct+'%';
  fill.className='bat-fill'+(pct<=20?' low':pct<=45?' mid':'');
  document.getElementById('bat-text').textContent=pct+'%';
  document.getElementById('bat-icon').textContent=charging?'⚡':'🔋';
}
function renderBatteryUnavailable(){
  document.getElementById('bat-fill').style.width='100%';
  document.getElementById('bat-fill').className='bat-fill';
  document.getElementById('bat-text').textContent='—';
  document.getElementById('bat-icon').textContent='🔌';
}
initBattery();

// ── Weather — real temp + icon ──
async function fetchWeather(){
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:10000,maximumAge:300000}));
    const lat=pos.coords.latitude.toFixed(2);
    const lon=pos.coords.longitude.toFixed(2);
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current_weather=true');
    const d=await r.json();
    if(d.current_weather){
      const temp=Math.round(d.current_weather.temperature);
      const code=d.current_weather.weathercode;
      const icon=weatherIcons[code]||'🌡️';
      document.getElementById('temp-val').textContent=temp+'°C';
      document.getElementById('weather-desc').textContent=icon;
    }
  }catch(e){
    // Fallback Lyon monthly averages
    const m=new Date().getMonth();
    document.getElementById('temp-val').textContent='~'+[3,5,10,14,18,23,26,25,21,15,8,4][m]+'°C';
  }
}
fetchWeather();
setInterval(fetchWeather,600000);

// ── Alarm ──
function toggleAlarm(){
  alarmOn=!alarmOn;
  document.getElementById('al-sw').classList.toggle('on',alarmOn);
  document.getElementById('al-time-btn').classList.toggle('on',alarmOn);
}
function toggleSnooze(){
  snoozeEnabled=!snoozeEnabled;
  document.getElementById('snooze-sw').classList.toggle('on',snoozeEnabled);
}
// Init snooze on
document.getElementById('snooze-sw').classList.add('on');

function toggleAPicker(){
  const el=document.getElementById('apicker');
  if(!el.classList.contains('open')){pickH=alarmH;pickM=alarmM;document.getElementById('ap-h').textContent=String(pickH).padStart(2,'0');document.getElementById('ap-m').textContent=String(pickM).padStart(2,'0');}
  el.classList.toggle('open');
}
function adjH(d){pickH=(pickH+d+24)%24;document.getElementById('ap-h').textContent=String(pickH).padStart(2,'0');}
function adjM(d){pickM=(pickM+d+60)%60;document.getElementById('ap-m').textContent=String(pickM).padStart(2,'0');}
function confirmAlarm(){
  alarmH=pickH;alarmM=pickM;
  document.getElementById('al-time-btn').textContent=String(alarmH).padStart(2,'0')+':'+String(alarmM).padStart(2,'0');
  alarmOn=true;
  document.getElementById('al-sw').classList.add('on');
  document.getElementById('al-time-btn').classList.add('on');
  document.getElementById('apicker').classList.remove('open');
}

function triggerAlarm(){
  alarmRinging=true;
  document.getElementById('ring-time').textContent=String(alarmH).padStart(2,'0')+':'+String(alarmM).padStart(2,'0');
  document.getElementById('ring-overlay').classList.add('open');
  document.getElementById('ring-snooze-btn').style.display=snoozeEnabled?'flex':'none';
  checkOrientation(); // apply rotation to ring overlay too
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    let playing=true;
    function beep(){
      if(!playing)return;
      const osc=ctx.createOscillator(),g=ctx.createGain();
      osc.connect(g);g.connect(ctx.destination);
      osc.frequency.value=880;osc.type='square';g.gain.value=0.15;
      osc.start();osc.stop(ctx.currentTime+0.12);
      setTimeout(()=>{if(playing)beep();},550);
    }
    beep();
    alarmCtx={ctx,stop:()=>{playing=false;try{ctx.close();}catch(e){}}};
  }catch(e){}
}
function stopAlarm(){
  alarmRinging=false;alarmOn=false;
  document.getElementById('ring-overlay').classList.remove('open');
  document.getElementById('al-sw').classList.remove('on');
  document.getElementById('al-time-btn').classList.remove('on');
  if(alarmCtx){alarmCtx.stop();alarmCtx=null;}
  if(snoozeTimeout){clearTimeout(snoozeTimeout);snoozeTimeout=null;}
}
function snoozeAlarm(){
  // Stop sound, re-trigger in 5 min
  alarmRinging=false;
  document.getElementById('ring-overlay').classList.remove('open');
  if(alarmCtx){alarmCtx.stop();alarmCtx=null;}
  snoozeTimeout=setTimeout(()=>{
    if(alarmOn||true){triggerAlarm();}// snooze always retriggers
  },5*60*1000);
}

// ── Settings ──
function openSettings(){
  document.getElementById('settings-overlay').classList.add('open');
  checkOrientation();
}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('open');}

// ── Wake Lock ──
async function reqWake(){
  try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
}
reqWake();
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')reqWake();});
// Also keep a hidden video playing as fallback for iOS wake lock
function iosKeepAwake(){
  try{
    const v=document.createElement('video');
    v.setAttribute('playsinline','');v.setAttribute('muted','');v.muted=true;
    v.style.cssText='position:fixed;top:-1px;left:-1px;width:1px;height:1px;opacity:0.01;pointer-events:none;';
    // Tiny silent video data URI (1 frame, 1 second)
    v.src='data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAAhmcmVlAAAAGG1kYXQAAABhBgX//13iRem95tlId6dNfGYAAAAPbW9vdgAAAGxtdmhkAAAAAAAAAAAAAAAAAAAA';
    v.loop=true;
    document.body.appendChild(v);
    // Play on first touch
    const play=()=>{v.play().catch(()=>{});};
    document.addEventListener('touchstart',play,{once:true});
    document.addEventListener('click',play,{once:true});
  }catch(e){}
}
iosKeepAwake();

document.addEventListener('gesturechange',e=>e.preventDefault(),{passive:false});

document.addEventListener('dblclick',e=>e.preventDefault());
