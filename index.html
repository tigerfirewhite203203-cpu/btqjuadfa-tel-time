<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Notify"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.svg"/>
  <title>Notify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.08);
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.3);
      --text: #f0ece4;
      --text-dim: rgba(240,236,228,0.45);
      --text-mid: rgba(240,236,228,0.7);
      --red: #e05c5c;
      --radius: 20px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── BACKGROUND ── */
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 10%, #1a1025 0%, #0a0a0f 60%),
                  radial-gradient(ellipse at 80% 90%, #0d1a2a 0%, transparent 60%);
      transition: background 0.8s ease, background-image 0.8s ease;
    }
    #bg-layer.has-image {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    #bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(10,10,15,0.55) 0%,
        rgba(10,10,15,0.2) 40%,
        rgba(10,10,15,0.65) 100%);
    }

    /* ── LAYOUT ── */
    #app {
      position: relative; z-index: 1;
      height: 100%; width: 100%;
      display: flex; flex-direction: column;
      padding-top: calc(var(--safe-top) + 16px);
      padding-bottom: calc(var(--safe-bottom) + 16px);
      overflow: hidden;
    }

    /* ── HEADER / CLOCK ── */
    #clock-section {
      padding: 8px 28px 0;
      flex-shrink: 0;
    }
    #time {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(72px, 22vw, 96px);
      line-height: 1;
      letter-spacing: -2px;
      color: var(--text);
      text-shadow: 0 2px 40px rgba(201,169,110,0.15);
    }
    #date-line {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── NOTIFICATION LIST ── */
    #notif-section {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 16px 8px;
      -webkit-overflow-scrolling: touch;
    }
    #notif-section::-webkit-scrollbar { display: none; }

    .section-label {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .notif-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
      animation: slideIn 0.35s cubic-bezier(.22,.68,0,1.2) both;
    }
    .notif-card:active { transform: scale(0.97); background: rgba(255,255,255,0.09); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .notif-card.dismissing {
      animation: dismissOut 0.3s ease forwards;
    }
    @keyframes dismissOut {
      to { opacity: 0; transform: translateX(60px) scale(0.93); max-height: 0; padding: 0; margin: 0; }
    }

    .notif-emoji {
      font-size: 28px;
      flex-shrink: 0;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .notif-body { flex: 1; min-width: 0; }
    .notif-source {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2px;
    }
    .notif-msg {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .notif-time {
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .notif-dismiss {
      background: none; border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .notif-dismiss:active { color: var(--red); }

    #empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
      display: none;
    }
    #empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
    #empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── BOTTOM BAR ── */
    #bottom-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px 0;
    }

    .bar-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text-mid);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      padding: 9px 18px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: flex; align-items: center; gap: 6px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .bar-btn:active { background: rgba(255,255,255,0.13); color: var(--text); }
    .bar-btn.primary {
      background: var(--gold-dim);
      border-color: rgba(201,169,110,0.4);
      color: var(--gold);
    }
    .bar-btn.primary:active { background: rgba(201,169,110,0.45); }

    /* ── DRAWER (Settings + Add) ── */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
      background: #141418;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      border-top: 1px solid var(--border);
      padding: calc(var(--safe-bottom) + 20px) 20px;
      padding-top: 20px;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(.22,.68,0,1.1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .drawer::-webkit-scrollbar { display: none; }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .drawer-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 26px;
      color: var(--text);
      margin-bottom: 20px;
    }

    /* form elements */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.1);
    }
    .field textarea { resize: none; height: 72px; }
    .field select option { background: #1e1e28; }

    .field-row { display: flex; gap: 10px; }
    .field-row .field { flex: 1; }

    /* day picker */
    .days-picker { display: flex; gap: 6px; flex-wrap: wrap; }
    .day-chip {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 12px;
      padding: 6px 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .day-chip.active {
      background: var(--gold-dim);
      border-color: rgba(201,169,110,0.5);
      color: var(--gold);
    }

    /* BG presets */
    .bg-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .bg-preset {
      aspect-ratio: 1.6/1;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .bg-preset:active { transform: scale(0.95); }
    .bg-preset.active { border-color: var(--gold); }
    .bg-preset span {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: rgba(255,255,255,0.7);
      letter-spacing: 0.5px;
    }

    /* source list */
    .source-item {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .source-emoji { font-size: 22px; }
    .source-info { flex: 1; min-width: 0; }
    .source-name { font-size: 14px; font-weight: 500; }
    .source-detail { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
    .source-delete {
      background: none; border: none;
      color: var(--text-dim); font-size: 18px;
      cursor: pointer; padding: 4px;
      transition: color 0.2s;
    }
    .source-delete:active { color: var(--red); }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 0;
      margin-bottom: 14px;
    }
    .toggle-label { font-size: 14px; color: var(--text-mid); }

    /* iOS-style toggle */
    .toggle { position: relative; width: 48px; height: 28px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 22px; width: 22px;
      left: 3px; top: 3px;
      background: white; border-radius: 50%;
      transition: transform 0.25s cubic-bezier(.22,.68,0,1.2);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .toggle input:checked + .toggle-slider { background: var(--gold); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    .btn-full {
      width: 100%;
      background: var(--gold-dim);
      border: 1px solid rgba(201,169,110,0.5);
      border-radius: 14px;
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-full:active { background: rgba(201,169,110,0.45); }

    .btn-secondary {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text-mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-secondary:active { background: rgba(255,255,255,0.1); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 18px 0;
    }

    /* toast */
    #toast {
      position: fixed; bottom: calc(var(--safe-bottom) + 90px); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,40,0.95);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      backdrop-filter: blur(12px);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* notification badge */
    #notif-count {
      background: var(--gold);
      color: #0a0a0f;
      font-size: 11px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

<!-- Background -->
<div id="bg-layer"></div>

<!-- Main App -->
<div id="app">

  <!-- Clock -->
  <div id="clock-section">
    <div id="time">00:00</div>
    <div id="date-line">Chargement…</div>
  </div>

  <!-- Notifications -->
  <div id="notif-section">
    <div class="section-label" id="notif-label">Aujourd'hui</div>
    <div id="notif-list"></div>
    <div id="empty-state">
      <div class="es-icon">🔔</div>
      <p>Aucune notification.<br>Configure tes sources dans les réglages.</p>
    </div>
  </div>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <button class="bar-btn" id="btn-clear">
      <span>✕</span> Tout effacer
    </button>
    <span id="notif-count"></span>
    <button class="bar-btn primary" id="btn-settings">
      <span>⚙</span> Réglages
    </button>
  </div>
</div>

<!-- ── SETTINGS DRAWER ── -->
<div class="drawer-overlay" id="settings-overlay"></div>
<div class="drawer" id="settings-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">Réglages</div>

  <!-- Notifications permission -->
  <div class="toggle-row">
    <span class="toggle-label">🔔 Activer les notifications</span>
    <label class="toggle">
      <input type="checkbox" id="notif-toggle"/>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="divider"></div>

  <!-- Background -->
  <div class="field">
    <label>Arrière-plan</label>
    <div class="bg-grid" id="bg-grid"></div>
    <div id="bg-image-row">
      <input type="url" id="bg-url-input" placeholder="URL d'une image…" style="border-radius:12px 12px 0 0; border-bottom:none;"/>
      <button class="btn-secondary" id="btn-bg-apply" style="border-radius:0 0 12px 12px; margin:0;">Appliquer l'image</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Sources -->
  <div class="section-label" style="margin-bottom:12px;">Sources configurées</div>
  <div id="source-list"></div>
  <button class="btn-secondary" id="btn-add-source">+ Ajouter une source</button>

</div>

<!-- ── ADD SOURCE DRAWER ── -->
<div class="drawer-overlay" id="add-overlay"></div>
<div class="drawer" id="add-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title" id="add-drawer-title">Nouvelle source</div>

  <div class="field-row">
    <div class="field" style="max-width:80px">
      <label>Emoji</label>
      <input type="text" id="f-emoji" maxlength="2" placeholder="📱"/>
    </div>
    <div class="field">
      <label>Nom de la source</label>
      <input type="text" id="f-name" placeholder="ex: Messages, Slack…"/>
    </div>
  </div>

  <div class="field">
    <label>Message affiché</label>
    <textarea id="f-msg" placeholder="ex: Tu as 3 nouveaux messages non lus"></textarea>
  </div>

  <div class="field-row">
    <div class="field">
      <label>Heure</label>
      <input type="time" id="f-time"/>
    </div>
    <div class="field">
      <label>Répéter</label>
      <select id="f-repeat">
        <option value="daily">Tous les jours</option>
        <option value="weekdays">Lun → Ven</option>
        <option value="custom">Personnalisé</option>
        <option value="once">Une seule fois</option>
      </select>
    </div>
  </div>

  <div class="field" id="custom-days-field" style="display:none">
    <label>Jours</label>
    <div class="days-picker" id="days-picker">
      <span class="day-chip active" data-d="0">Dim</span>
      <span class="day-chip active" data-d="1">Lun</span>
      <span class="day-chip active" data-d="2">Mar</span>
      <span class="day-chip active" data-d="3">Mer</span>
      <span class="day-chip active" data-d="4">Jeu</span>
      <span class="day-chip active" data-d="5">Ven</span>
      <span class="day-chip active" data-d="6">Sam</span>
    </div>
  </div>

  <input type="hidden" id="f-edit-id"/>
  <button class="btn-full" id="btn-save-source">Enregistrer</button>
  <button class="btn-secondary" id="btn-cancel-add">Annuler</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let sources   = JSON.parse(localStorage.getItem('notify_sources')   || '[]');
let received  = JSON.parse(localStorage.getItem('notify_received')  || '[]');
let settings  = JSON.parse(localStorage.getItem('notify_settings')  || '{}');

const DAYS_MAP = ['dim','lun','mar','mer','jeu','ven','sam'];

/* ═══════════════════════════════════════
   CLOCK
═══════════════════════════════════════ */
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('time').textContent = `${h}:${m}`;
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janv','févr','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'];
  document.getElementById('date-line').textContent =
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ═══════════════════════════════════════
   BACKGROUND
═══════════════════════════════════════ */
const BG_PRESETS = [
  { id:'dark',    label:'Nuit',      bg:'radial-gradient(ellipse at 20% 10%, #1a1025 0%, #0a0a0f 60%), radial-gradient(ellipse at 80% 90%, #0d1a2a 0%, transparent 60%)' },
  { id:'aurora',  label:'Aurore',    bg:'linear-gradient(135deg,#0d1117 0%,#0d2240 40%,#0a1f1a 70%,#120d20 100%)' },
  { id:'dusk',    label:'Crépusc.',  bg:'linear-gradient(160deg,#1a0a15 0%,#2a0a20 30%,#0a0a1f 70%,#0a0f1a 100%)' },
  { id:'forest',  label:'Forêt',     bg:'linear-gradient(150deg,#060f08 0%,#0a1f10 40%,#050e12 100%)' },
  { id:'ember',   label:'Braise',    bg:'linear-gradient(150deg,#150805 0%,#2a1005 40%,#0f0810 100%)' },
  { id:'ice',     label:'Glace',     bg:'linear-gradient(135deg,#080f18 0%,#0d1e30 50%,#060d18 100%)' },
];

const PRESET_COLORS = {
  dark:'#1a1025,#0a0a0f', aurora:'#0d2240,#0a1f1a', dusk:'#2a0a20,#0a0a1f',
  forest:'#0a1f10,#050e12', ember:'#2a1005,#0f0810', ice:'#0d1e30,#060d18'
};

function buildBgGrid() {
  const grid = document.getElementById('bg-grid');
  grid.innerHTML = '';
  BG_PRESETS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'bg-preset' + (settings.bgId === p.id ? ' active' : '');
    el.style.background = p.bg;
    el.innerHTML = `<span>${p.label}</span>`;
    el.onclick = () => applyBgPreset(p);
    grid.appendChild(el);
  });
}

function applyBgPreset(p) {
  settings.bgId = p.id;
  settings.bgImage = null;
  saveSettings();
  const bg = document.getElementById('bg-layer');
  bg.className = '';
  bg.style.backgroundImage = '';
  bg.style.background = p.bg;
  buildBgGrid();
}

function applyBgImage(url) {
  settings.bgId = 'custom';
  settings.bgImage = url;
  saveSettings();
  const bg = document.getElementById('bg-layer');
  bg.className = 'has-image';
  bg.style.background = '';
  bg.style.backgroundImage = `url(${url})`;
  buildBgGrid();
}

function restoreBg() {
  if (settings.bgImage) {
    applyBgImage(settings.bgImage);
  } else {
    const p = BG_PRESETS.find(x => x.id === (settings.bgId || 'dark')) || BG_PRESETS[0];
    applyBgPreset(p);
  }
}

/* ═══════════════════════════════════════
   NOTIFICATIONS
═══════════════════════════════════════ */
function renderNotifs() {
  const list = document.getElementById('notif-list');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('notif-count');
  list.innerHTML = '';

  if (!received.length) {
    empty.style.display = 'block';
    count.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  count.style.display = 'inline';
  count.textContent = received.length;

  [...received].reverse().forEach((n, i) => {
    const card = document.createElement('div');
    card.className = 'notif-card';
    card.style.animationDelay = `${i * 0.04}s`;
    card.innerHTML = `
      <div class="notif-emoji">${n.emoji || '🔔'}</div>
      <div class="notif-body">
        <div class="notif-source">${n.source}</div>
        <div class="notif-msg">${n.msg}</div>
      </div>
      <span class="notif-time">${n.time}</span>
      <button class="notif-dismiss" data-id="${n.id}" title="Effacer">×</button>
    `;
    list.appendChild(card);
  });

  list.querySelectorAll('.notif-dismiss').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      dismissNotif(btn.dataset.id);
    };
  });
}

function addNotif(source) {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const n = {
    id: Date.now() + Math.random(),
    emoji: source.emoji,
    source: source.name,
    msg: source.msg,
    time: `${h}:${m}`
  };
  received.unshift(n);
  if (received.length > 50) received = received.slice(0, 50);
  saveReceived();
  renderNotifs();
  triggerBrowserNotif(source);
}

function dismissNotif(id) {
  const card = document.querySelector(`[data-id="${id}"]`)?.closest('.notif-card');
  if (card) {
    card.classList.add('dismissing');
    setTimeout(() => {
      received = received.filter(n => String(n.id) !== String(id));
      saveReceived();
      renderNotifs();
    }, 300);
  }
}

function clearAll() {
  received = [];
  saveReceived();
  renderNotifs();
  showToast('Notifications effacées');
}

/* ═══════════════════════════════════════
   BROWSER NOTIFICATIONS
═══════════════════════════════════════ */
async function requestPermission() {
  if (!('Notification' in window)) return false;
  const p = await Notification.requestPermission();
  settings.notifEnabled = p === 'granted';
  saveSettings();
  document.getElementById('notif-toggle').checked = settings.notifEnabled;
  if (p !== 'granted') showToast('Notifications refusées par le navigateur');
  return p === 'granted';
}

function triggerBrowserNotif(source) {
  if (!settings.notifEnabled || !('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  new Notification(source.name, {
    body: source.msg,
    icon: 'icon-192.svg',
    badge: 'icon-192.svg'
  });
}

/* ═══════════════════════════════════════
   SCHEDULING — système hybride
   1) Au démarrage : rattrape les notifs manquées
   2) Toutes les minutes : vérifie si une notif doit partir
   3) setTimeout de précision pour l'heure exacte
═══════════════════════════════════════ */

// lastFired stocke { sourceId: "YYYY-MM-DD" } — le dernier jour où la notif a été envoyée
let lastFired = JSON.parse(localStorage.getItem('notify_lastFired') || '{}');
function saveLastFired() { localStorage.setItem('notify_lastFired', JSON.stringify(lastFired)); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function shouldFireToday(s) {
  const d = new Date().getDay();
  if (s.repeat === 'daily') return true;
  if (s.repeat === 'weekdays') return d >= 1 && d <= 5;
  if (s.repeat === 'custom') return (s.days || []).includes(d);
  if (s.repeat === 'once') return lastFired[s.id] !== 'fired';
  return true;
}

function alreadyFiredToday(s) {
  return lastFired[s.id] === todayStr();
}

function markFired(s) {
  lastFired[s.id] = s.repeat === 'once' ? 'fired' : todayStr();
  saveLastFired();
}

// Vérifie si une source aurait dû sonner (y compris pendant que l'app était fermée)
function checkSource(s, now) {
  if (!s.enabled) return;
  if (!shouldFireToday(s)) return;
  if (alreadyFiredToday(s)) return;

  const [h, m] = s.time.split(':').map(Number);
  const fireTime = new Date(now);
  fireTime.setHours(h, m, 0, 0);

  if (now >= fireTime) {
    // L'heure est passée aujourd'hui et on n'a pas encore déclenché
    addNotif(s);
    markFired(s);
  }
}

// Vérifie TOUTES les sources — appelé au démarrage et toutes les minutes
function checkAllSources() {
  const now = new Date();
  sources.forEach(s => checkSource(s, now));
}

// setTimeout de précision : se déclenche à l'heure exacte si l'app est ouverte
let precisionTimers = {};
function scheduleAll() {
  Object.values(precisionTimers).forEach(clearTimeout);
  precisionTimers = {};

  // Rattrape d'abord les notifs manquées
  checkAllSources();

  // Programme un setTimeout précis pour chaque source
  sources.forEach(s => {
    if (!s.enabled) return;
    if (!shouldFireToday(s)) return;
    if (alreadyFiredToday(s)) return;

    const now = new Date();
    const [h, m] = s.time.split(':').map(Number);
    const target = new Date();
    target.setHours(h, m, 0, 0);

    // Si l'heure d'aujourd'hui n'est pas encore passée
    if (target > now) {
      const delay = target - now;
      precisionTimers[s.id] = setTimeout(() => {
        if (shouldFireToday(s) && !alreadyFiredToday(s)) {
          addNotif(s);
          markFired(s);
        }
        // Re-programme pour demain
        delete precisionTimers[s.id];
        setTimeout(() => scheduleAll(), 60000);
      }, delay);
    }
  });
}

// Vérification toutes les minutes (filet de sécurité)
setInterval(checkAllSources, 60 * 1000);

// Vérification au retour sur l'app (sortie arrière-plan)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    // Recharge les données depuis localStorage au cas où une autre instance aurait écrit
    sources   = JSON.parse(localStorage.getItem('notify_sources')   || '[]');
    received  = JSON.parse(localStorage.getItem('notify_received')  || '[]');
    lastFired = JSON.parse(localStorage.getItem('notify_lastFired') || '{}');
    checkAllSources();
    renderNotifs();
  }
});

/* ═══════════════════════════════════════
   SOURCES UI
═══════════════════════════════════════ */
function renderSources() {
  const list = document.getElementById('source-list');
  list.innerHTML = '';
  if (!sources.length) {
    list.innerHTML = '<p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">Aucune source configurée.</p>';
    return;
  }
  sources.forEach(s => {
    const el = document.createElement('div');
    el.className = 'source-item';
    const daysLabel = s.repeat === 'daily' ? 'Tous les jours'
      : s.repeat === 'weekdays' ? 'Lun–Ven'
      : s.repeat === 'custom' ? (s.days||[]).map(d=>DAYS_MAP[d]).join(', ')
      : 'Une fois';
    const isOn = s.enabled !== false;
    el.innerHTML = `
      <div class="source-emoji" style="opacity:${isOn?1:0.35}">${s.emoji || '🔔'}</div>
      <div class="source-info" style="opacity:${isOn?1:0.45};cursor:pointer">
        <div class="source-name">${s.name}</div>
        <div class="source-detail">${s.time} · ${daysLabel}</div>
      </div>
      <label class="toggle" title="${isOn?'Désactiver':'Activer'}">
        <input type="checkbox" class="source-toggle" data-id="${s.id}" ${isOn?'checked':''}/>
        <span class="toggle-slider"></span>
      </label>
      <button class="source-edit" data-id="${s.id}" title="Modifier" style="background:none;border:none;color:var(--text-dim);font-size:15px;cursor:pointer;padding:4px;margin-left:2px;">✎</button>
      <button class="source-delete" data-id="${s.id}" title="Supprimer" style="background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:4px;">🗑</button>
    `;
    list.appendChild(el);
  });

  list.querySelectorAll('.source-toggle').forEach(cb => {
    cb.onchange = () => toggleSource(cb.dataset.id, cb.checked);
  });
  list.querySelectorAll('.source-edit').forEach(btn => {
    btn.onclick = () => editSource(btn.dataset.id);
  });
  list.querySelectorAll('.source-delete').forEach(btn => {
    btn.onclick = () => deleteSource(btn.dataset.id);
  });
}

function toggleSource(id, enabled) {
  const s = sources.find(x => String(x.id) === String(id));
  if (!s) return;
  s.enabled = enabled;
  saveSources();
  scheduleAll();
  renderSources();
  showToast(enabled ? `${s.name} activée ✓` : `${s.name} mise en pause`);
}

function deleteSource(id) {
  sources = sources.filter(s => String(s.id) !== String(id));
  saveSources();
  renderSources();
  scheduleAll();
  showToast('Source supprimée');
}

function editSource(id) {
  const s = sources.find(x => String(x.id) === String(id));
  if (!s) return;
  document.getElementById('add-drawer-title').textContent = 'Modifier la source';
  document.getElementById('f-emoji').value = s.emoji || '';
  document.getElementById('f-name').value = s.name;
  document.getElementById('f-msg').value = s.msg;
  document.getElementById('f-time').value = s.time;
  document.getElementById('f-repeat').value = s.repeat;
  document.getElementById('f-edit-id').value = id;
  toggleCustomDays(s.repeat);
  if (s.repeat === 'custom') {
    document.querySelectorAll('.day-chip').forEach(c => {
      c.classList.toggle('active', (s.days||[]).includes(Number(c.dataset.d)));
    });
  }
  closeDrawer('settings');
  openDrawer('add');
}

/* ═══════════════════════════════════════
   DRAWER HELPERS
═══════════════════════════════════════ */
function openDrawer(name) {
  document.getElementById(`${name}-overlay`).classList.add('open');
  document.getElementById(`${name}-drawer`).classList.add('open');
}
function closeDrawer(name) {
  document.getElementById(`${name}-overlay`).classList.remove('open');
  document.getElementById(`${name}-drawer`).classList.remove('open');
}

/* ═══════════════════════════════════════
   PERSISTENCE
═══════════════════════════════════════ */
function saveSources() { localStorage.setItem('notify_sources', JSON.stringify(sources)); }
function saveReceived() { localStorage.setItem('notify_received', JSON.stringify(received)); }
function saveSettings() { localStorage.setItem('notify_settings', JSON.stringify(settings)); }

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════
   INIT & EVENTS
═══════════════════════════════════════ */
document.getElementById('btn-settings').onclick = () => {
  renderSources();
  openDrawer('settings');
};
document.getElementById('settings-overlay').onclick = () => closeDrawer('settings');
document.getElementById('add-overlay').onclick = () => closeDrawer('add');
document.getElementById('btn-clear').onclick = clearAll;

document.getElementById('btn-add-source').onclick = () => {
  document.getElementById('add-drawer-title').textContent = 'Nouvelle source';
  document.getElementById('f-emoji').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-msg').value = '';
  document.getElementById('f-time').value = '08:00';
  document.getElementById('f-repeat').value = 'daily';
  document.getElementById('f-edit-id').value = '';
  toggleCustomDays('daily');
  document.querySelectorAll('.day-chip').forEach(c => c.classList.add('active'));
  closeDrawer('settings');
  openDrawer('add');
};

document.getElementById('btn-cancel-add').onclick = () => {
  closeDrawer('add');
  openDrawer('settings');
};

document.getElementById('f-repeat').onchange = function() {
  toggleCustomDays(this.value);
};

function toggleCustomDays(val) {
  document.getElementById('custom-days-field').style.display = val === 'custom' ? 'block' : 'none';
}

document.querySelectorAll('.day-chip').forEach(c => {
  c.onclick = () => c.classList.toggle('active');
});

document.getElementById('btn-save-source').onclick = () => {
  const emoji = document.getElementById('f-emoji').value.trim() || '🔔';
  const name  = document.getElementById('f-name').value.trim();
  const msg   = document.getElementById('f-msg').value.trim();
  const time  = document.getElementById('f-time').value;
  const repeat= document.getElementById('f-repeat').value;
  const editId= document.getElementById('f-edit-id').value;

  if (!name || !time) { showToast('Nom et heure requis'); return; }

  const days = [...document.querySelectorAll('.day-chip.active')].map(c => Number(c.dataset.d));

  if (editId) {
    const idx = sources.findIndex(s => String(s.id) === editId);
    if (idx > -1) sources[idx] = { ...sources[idx], emoji, name, msg, time, repeat, days, enabled:true };
  } else {
    sources.push({ id: Date.now(), emoji, name, msg, time, repeat, days, enabled:true });
  }

  saveSources();
  scheduleAll();
  closeDrawer('add');
  openDrawer('settings');
  renderSources();
  showToast(editId ? 'Source mise à jour ✓' : 'Source ajoutée ✓');
};

// Notifications toggle
document.getElementById('notif-toggle').onchange = async function() {
  if (this.checked) {
    await requestPermission();
  } else {
    settings.notifEnabled = false;
    saveSettings();
  }
};

// BG
document.getElementById('btn-bg-apply').onclick = () => {
  const url = document.getElementById('bg-url-input').value.trim();
  if (url) { applyBgImage(url); showToast('Fond appliqué ✓'); }
  else showToast('Entrez une URL d\'image valide');
};

/* ─ Init ─ */
restoreBg();
buildBgGrid();
document.getElementById('notif-toggle').checked = !!settings.notifEnabled;
if (settings.notifEnabled && 'Notification' in window) {
  Notification.requestPermission();
}
renderNotifs();
scheduleAll();

/* register SW */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
